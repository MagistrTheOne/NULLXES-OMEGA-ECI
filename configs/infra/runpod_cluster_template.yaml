runpod:
  workspace:
    repo_mount: /workspace/nullxes-omega-eci
    data_mount: /workspace/data
    checkpoint_mount: /workspace/checkpoints

  image:
    name: nullxes-eci-trainer
    tag: latest

  env:
    - WANDB_API_KEY
    - S3_ENDPOINT
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    - CHECKPOINT_BUCKET

  launch:
    retry_count: 3
    startup_timeout_seconds: 1200
    health_check_interval_seconds: 30

  logging:
    stdout_stream: true
    metrics_stream: true
    save_job_manifest: true

